name: IndexNow - Notify Search Engines

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'
      - '_tabs/**'

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed URLs
        id: changed
        run: |
          # Find changed/added post files
          URLS=""
          for file in $(git diff --name-only HEAD~1 HEAD -- '_posts/' '_tabs/'); do
            if [[ "$file" == _posts/*.md ]]; then
              # Extract slug from filename: YYYY-MM-DD-slug.md -> slug
              slug=$(basename "$file" .md | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
              URLS="${URLS}\"https://khushaljethava.work/posts/${slug}/\","
            elif [[ "$file" == _tabs/*.md ]]; then
              slug=$(basename "$file" .md)
              URLS="${URLS}\"https://khushaljethava.work/${slug}/\","
            fi
          done
          # Remove trailing comma
          URLS="${URLS%,}"
          echo "urls=[$URLS]" >> $GITHUB_OUTPUT
          echo "Found URLs: [$URLS]"

      - name: Ping IndexNow
        if: steps.changed.outputs.urls != '[]'
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "khushaljethava.work",
              "key": "4851a52678074ce6a07a9c6e2591062c",
              "urlList": ${{ steps.changed.outputs.urls }}
            }'
          echo "IndexNow pinged for: ${{ steps.changed.outputs.urls }}"
