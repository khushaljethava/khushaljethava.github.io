{% if page.layout == 'post' and page.howto %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "HowTo",
  "name": {{ page.title | jsonify }},
  "description": {{ page.description | default: page.excerpt | strip_html | truncate: 200 | jsonify }},
  "url": "{{ site.url }}{{ page.url }}",
  {% if page.howto.total_time %}"totalTime": "{{ page.howto.total_time }}",{% endif %}
  "step": [
    {% for step in page.howto.steps %}
    {
      "@type": "HowToStep",
      "position": {{ forloop.index }},
      "name": {{ step.name | jsonify }},
      "text": {{ step.text | jsonify }}{% if step.url %},
      "url": "{{ site.url }}{{ page.url }}#{{ step.name | slugify }}"{% endif %}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}
