<!--
  Jekyll Simple Search loader
  See: <https://github.com/christian-fei/Simple-Jekyll-Search>

  Local override of the theme include: SimpleJekyllSearch fetches
  /assets/js/data/search.json (~334 KB) the moment it initialises, on every page
  load, whether or not anyone searches. Initialisation is deferred here until the
  search box is actually focused.
-->

{% capture result_elem %}
  <article class="px-1 px-sm-2 px-lg-4 px-xl-0">
    <header>
      <h2><a href="{url}">{title}</a></h2>
      <div class="post-meta d-flex flex-column flex-sm-row text-muted mt-1 mb-1">
        {categories}
        {tags}
      </div>
    </header>
    <p>{content}</p>
  </article>
{% endcapture %}

{% capture not_found %}<p class="mt-5">{{ site.data.locales[include.lang].search.no_results }}</p>{% endcapture %}

<script>
  {% comment %} Note: dependent library will be loaded in `js-selector.html` {% endcomment %}
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('search-input');

    if (!searchInput) {
      return;
    }

    let initialized = false;

    const initSearch = () => {
      if (initialized) {
        return;
      }
      initialized = true;

      SimpleJekyllSearch({
        searchInput: searchInput,
        resultsContainer: document.getElementById('search-results'),
        json: '{{ '/assets/js/data/search.json' | relative_url }}',
        searchResultTemplate: '{{ result_elem | strip_newlines }}',
        noResultsText: '{{ not_found }}',
        templateMiddleware: function(prop, value, template) {
          if (prop === 'categories') {
            if (value === '') {
              return `${value}`;
            } else {
              return `<div class="me-sm-4"><i class="far fa-folder fa-fw"></i>${value}</div>`;
            }
          }

          if (prop === 'tags') {
            if (value === '') {
              return `${value}`;
            } else {
              return `<div><i class="fa fa-tag fa-fw"></i>${value}</div>`;
            }
          }
        }
      });
    };

    // ponytail: focus gives the fetch a head start before the first keystroke.
    // If a user ever pastes-and-submits faster than the index loads, switch to a
    // `success`-callback re-dispatch instead.
    searchInput.addEventListener('focus', initSearch, { once: true });
  });
</script>
